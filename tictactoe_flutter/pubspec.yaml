name: tictactoe_flutter
description: "Tic-Tac-Toe Flutter app with Supabase backend - same as React version."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase backend (same as React app)
  supabase_flutter: ^2.8.4

  # QR Code generation and scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  # Local storage (like localStorage in React)
  shared_preferences: ^2.3.3

  # Google Fonts (like the React app's fonts)
  google_fonts: ^6.2.1

  # URL launcher for share
  url_launcher: ^6.3.1

  # UUID for unique IDs if needed
  uuid: ^4.5.1

  # Native share sheet
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
